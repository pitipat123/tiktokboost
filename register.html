<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก — TikTokBoost</title>
    <meta name="description" content="สมัครสมาชิก TikTokBoost ฟรี เริ่มปั้มไลค์ เพิ่มผู้ติดตาม วิว ได้ทันที">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>

<body>

    <div class="auth-page">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <a href="index.html" class="navbar-brand"
                    style="justify-content: center; margin-bottom: var(--space-xl);">
                    <span class="logo-icon">🚀</span>
                    TikTokBoost
                </a>
                <h1>สมัครสมาชิก</h1>
                <p>สมัครฟรี! เริ่มปั้มไลค์ เพิ่มผู้ติดตาม ได้ทันที</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="regName">ชื่อ — นามสกุล</label>
                    <input type="text" id="regName" class="form-input" placeholder="กรอกชื่อ-นามสกุล" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regEmail">อีเมล</label>
                    <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regPassword">รหัสผ่าน</label>
                    <input type="password" id="regPassword" class="form-input" placeholder="อย่างน้อย 8 ตัวอักษร"
                        required minlength="8">
                </div>

                <div class="form-group">
                    <label class="form-label" for="regConfirm">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="regConfirm" class="form-input" placeholder="ยืนยันรหัสผ่านอีกครั้ง"
                        required minlength="8">
                </div>

                <div class="form-group">
                    <label class="form-checkbox">
                        <input type="checkbox" required> ฉันยอมรับ <a href="#"
                            style="margin-left: 4px;">ข้อกำหนดการใช้งาน</a> และ <a href="#">นโยบายความเป็นส่วนตัว</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">🚀 สมัครสมาชิกฟรี</button>
            </form>

            <div class="auth-divider">หรือ</div>

            <button class="btn btn-google btn-lg" onclick="window.location.href='dashboard.html'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                สมัครด้วย Google
            </button>

            <div class="auth-footer">
                มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
